name: alpha_crush
description: A Candy Crush-style word puzzle game where players reconstruct letters from scattered fragments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_mobile_ads: ^4.0.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.13.1
  confetti: ^0.7.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/tap.mp3
    - assets/sounds/correct.mp3
    - assets/sounds/wrong.mp3
    - assets/sounds/build_complete.mp3
    - assets/sounds/combo.mp3
    - assets/sounds/bgm.mp3

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#9C27B0"
  adaptive_icon_foreground: "assets/images/app_icon.png"
